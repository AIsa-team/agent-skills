name: Dispatch agent-skills-io

on:
  push:
    branches:
      - main

concurrency:
  group: dispatch-agent-skills-io-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when dispatch token is missing
        if: ${{ secrets.AGENT_SKILLS_IO_DISPATCH_TOKEN == '' }}
        run: |
          echo "AGENT_SKILLS_IO_DISPATCH_TOKEN is not configured; skipping downstream dispatch."

      - name: Trigger agent-skills-io pipeline
        if: ${{ secrets.AGENT_SKILLS_IO_DISPATCH_TOKEN != '' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.AGENT_SKILLS_IO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          cat > payload.json <<'JSON'
          {
            "event_type": "upstream-agent-skills-push",
            "client_payload": {
              "selection": "changed",
              "dry_run": "false",
              "sync_adjacent_repos": "true",
              "push_adjacent_repos": "true",
              "clawhub_publish": "both",
              "clawhub_dry_run": "false",
              "source_repo": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}"
            }
          }
          JSON

          curl -sSf \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/baofeng-tech/agent-skills-io/dispatches \
            --data @payload.json
