name: Sync Market Pulse Skills

on:
  push:
    branches:
      - main

jobs:

  sync-marketpulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout  repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@aisa.one"

      - name: Split marketpulse subtree
        run: |
          git subtree split --prefix=marketpulse -b split-marketpulse       
          ls -la

