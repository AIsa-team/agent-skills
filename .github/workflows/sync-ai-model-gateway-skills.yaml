name: Sync AI Model Gateway Skills

on:
  push:
    branches:
      - main

jobs:

  sync-ai-model-gateway:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout  repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@aisa.one"

      - name: Split AI Model Gateway folder
        run: |
          ls -la
          
          find . -mindepth 1 -maxdepth 1 \
            ! -name "aisa-provider" \
            ! -name "cn-llm" \
            ! -name "llm-router" \

            ! -name ".git" \
            ! -name ".gitignore" \
            ! -name "LICENSE" \
            ! -name "README.md" \
            ! -name "SKILL_AUTHORING.md" \
            ! -name "SKILL_DEDUP_ANALYSIS.md" \
            -exec rm -rf {} +
          
          ls -a

      - name: Commit and push to AI Model Gateway Repo
        env:
          TOKEN: ${{ secrets.SYNC_AISAS_KILLS_TOKEN  }}
        run: |
          ls -la

          git status -s
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync AI Model Gateway folder"
            git remote set-url origin "https://x-access-token:${TOKEN}@github.com/AISA-skills/ai-model-gateway-skills.git"
            git push origin main --force
          fi